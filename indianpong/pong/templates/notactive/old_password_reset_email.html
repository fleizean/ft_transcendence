<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Email</title>
</head>
<body>
    <h1>Password Reset</h1>
    <p>Dear {{ user.username }},</p>
    <p>We have received a request to reset your password. Please click the link below to reset your password:</p>
    <a href= "http://{{domain}}{% url 'set_password' uidb64=uid token=token %}" style="background-color: #FF0000; color: white; padding: 10px 20px; text-decoration: none;">Reset Password</a>
    <p>If you did not request a password reset, please ignore this email.</p>
    <p>Best regards,</p>
    <p>The Indian Pong Team</p>
</body>
</html>
